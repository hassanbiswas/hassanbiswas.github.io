  <style>

      /* Loading Screen */                                                           
      /* Hide elements in App Mode */

      /* view trasition api */
      @view-transition {
        navigation: auto;
      }

      .card:has(img) {
        view-transition-name: hero-image;
      }

      .projects:has(img.banner) {
        view-transition-name: hero-image;
      }

      /* Styling the overall transition */
      ::view-transition-group(root) {
        animation-duration: var(--duration-normal);
        animation-timing-function: var(--bouncy);
      }

      /* Custom fade-out for the old page */
      ::view-transition-old(root) {
        animation: 400ms var(--ease-out) both fade-out;
      }

      /* Custom slide-in for the new page */
      ::view-transition-new(root) {
        animation: 400ms var(--ease-in) both slide-from-right;
      }

      @keyframes slide-from-right {
        from { transform: translateX(100%); }
      }

      /* Inter Variable Font (Headings) */
      @font-face {
        /* font-family: "Inter"; */
        font-family: "Head";
        src: url("https://hassanbiswas.github.io/assets/fonts/inter/Inter-VariableFont_opsz,wght.ttf") format("truetype-variations");
        /* Define the range of weights the file supports */
        font-weight: 100 900; 
        font-display: swap;
      }

      /* Montserrat Variable Font (Body) */
      @font-face {
        /* font-family: "Montserrat"; */
        font-family: "Body";
        src: url("https://hassanbiswas.github.io/assets/fonts/montserrat/Montserrat-VariableFont_wght.ttf") format("truetype-variations");
        font-weight: 100 900;
        font-display: swap;
      }

      /* it's default for html meta-theme */
      /* 1. Register Property for Smooth Transitions */
      
      @property --brand-color {
        syntax: "<color>";
        inherits: true;
        initial-value: hsl(240 80% 50%); /* 240 80% 50% */
      }

      /* 2. Root Element - Accessibility & Base Units */
      html {
        font-size: 62.5%; /* 1rem = 10px */
      
        /* Fix for mobile height issues */
        min-height: 100dvh;

        background: var(--primary-50);
                                                      
        interpolate-size: allow-keywords; /* animate/transition: height/width */
        transition-behavior: allow-discrete; /* opacity, display, overlay */
        content-visibility: auto;

      
        /* for text area */
        /* scrollbar-gutter: none;
        scrollbar-width: none; */
                                                                                      
        /* for parrent */
        scroll-behavior: smooth;
        overscroll-behavior: contain;
        scroll-snap-type: y proximity;
        /* scroll-padding: 0em; */ /* for curossel paddin */
                                                                                                                
        /* for child */
        & > * {
          scroll-snap-align: start;
          scroll-snap-stop: always;
          /* scroll-margin: 0em; */ /* if stiky navbar */
        }
      }

      /* Example Fallback */
      @supports (interpolate-size: allow-keywords) {
        html {
          interpolate-size: allow-keywords;
        }
      }
      


      

      /* 3. Global Variables & Design Tokens */
      :root {
        /* 1. Required for light-dark() to function */
        color-scheme: light dark;

        /* --- Color System --- */                                   
        /* --color: light-dark(white, black); */
        
        /* --- Primary Brand Scale --- */
        /* We use the base color but adjust lightness dynamically */
        /* low shades for text elements */
        
        /* high-contrast text */
        --txt-1: light-dark(
          hsl(from var(--primary-50) h s 3%),
          hsl(from var(--primary-50) h s 95%)
        );
        /* secondary text */
        --txt-2: light-dark(
          hsl(from var(--primary-50) h s 9%),
          hsl(from var(--primary-50) h s 89%)
        );
        /* caption, placeholder */
        /* component's borders */
        --txt-3: light-dark(
          hsl(from var(--primary-50) h s 15%),
          hsl(from var(--primary-50) h s 83%)
        );

        /* Mid shades for UI elements */
        --primary-40: light-dark(
          hsl(from var(--primary-50) h s 34%),
          hsl(from var(--primary-50) h s 66%)
        );
        /* main buttons/actions/branding/html/header/footer */
        --primary-50: light-dark( /* Brand Base 50 */
          hsl(from var(--brand-color) h s 50%),
          hsl(from var(--brand-color) h s 50%)
        );
        /* button hover */
        --primary-60: light-dark(
          hsl(from var(--primary-50) h s 66%),
          hsl(from var(--primary-50) h s 34%)
        );

        /* Light shades for backgrounds */
        --bg-3: light-dark(
          hsl(from var(--primary-50) h s 86%),
          hsl(from var(--primary-50) h s 15%)
        );
        /* secondary background */
        --bg-2: light-dark(
          hsl(from var(--primary-50) h s 92%),
          hsl(from var(--primary-50) h s 9%)
        );
        /* high-contrast background */
        --bg-1: light-dark(
          hsl(from var(--primary-50) h s 98%),
          hsl(from var(--primary-50) h s 3%)
        );
        

        /* --- UI Elements --- */
        --border-clr: light-dark(rgba(0, 0, 0, 0.1), rgba(255, 255, 255, 0.1));
        --action-clr: var(--primary-50);
        --action-hover: var(--primary-60);

        /* --primary-50-hover: color-mix(in hsl, var(--primary-50), transparent 10%); */

        --black: #000;
        --white: #fff;
        
        /* Base Hues (Adjust these to change the whole theme) */
        --h-success: 142; /* Green */
        --h-error: 0;     /* Red */
        --h-warning: 38;  /* Orange/Yellow */
        --h-info: 196;    /* Sky Blue (Better than pure yellow for info) */
                                  
        /* Semantic Colors */
        --clr-success: hsl(var(--h-success), 70%, 45%);
        --clr-error:   hsl(var(--h-error), 72%, 50%);
        --clr-warning: hsl(var(--h-warning), 90%, 50%);
        --clr-info:    hsl(var(--h-info), 80%, 48%);
        /* Status Colors using HSL relative to a base red/green/yellow */
        --success: hsl(140, 80%, 45%);
        --error:   hsl(0, 80%, 60%);
        --warning: hsl(45, 90%, 50%);
                                                          
        /* Accent & Primary */
        /* Assuming --primary-50 is your brand's mid-tone */
        /* Semantic Accent Link */
        --clr-accent: var(--primary-50);
                                                                          
        /* Interactive States (using your --scale logic for subtle shifts) */
        --clr-success-hover: hsl(var(--h-success), 70%, 35%);
        --clr-error-hover:   hsl(var(--h-error), 72%, 40%);
        
        /* 10% Opacity versions for backgrounds/alerts */
        --clr-success-bg: hsla(var(--h-success), 70%, 45%, 0.1);
        --clr-error-bg:   hsla(var(--h-error), 72%, 50%, 0.1);
        --clr-warning-bg: hsla(var(--h-warning), 90%, 50%, 0.1);
        --clr-info-bg:    hsla(var(--h-info), 80%, 48%, 0.1);
        /* Alpha/Surface variants for subtle alerts */
        --success-bg: light-dark(hsl(from var(--success) h s 95%), hsl(from var(--success) h s 15%));
        --error-bg:   light-dark(hsl(from var(--error) h s 95%), hsl(from var(--error) h s 15%));
                        

        /* ====== font ====== */
        /* 
        --ffh: "Inter", sans-serif;
        --ffb: "Montserrat", sans-serif;
        */

        --ffh: "Head", sans-serif;
        --ffb: "Body", sans-serif;

        /* fluidity min & max */
        --max-width: 140rem;  /* 1280px */
        --min-width: 37.5rem; /* 375px */

        /* Progress ratio: 0 at min-width, 1 at max-width */
        --progress: calc((100cqi - var(--min-width)) / (var(--max-width) - var(--min-width)));

        --linear-interpolation: clamp(
          var(--min-value),
          calc(var(--min-value) + (var(--max-value) - var(--min-value)) * var(--progress)),
          var(--max-value)
        );

        /* fluid typography */
        /* 4. Downward Scale (Smaller than Body) */
        --p-xsm: calc(var(--p-sm) / var(--scale)); /* Divide the small size again */
        --p-sm:  calc(var(--p) / var(--scale));

        --p: clamp(
          1.2rem,
          calc(1.2rem + (1.6rem - 1.2rem) * var(--progress)),
          1.6rem
        );

        --scale: 1.272; /* The "Golden" Middle Ground */

        /* 5. Upward Scale (Headings) */
        --h6: calc(var(--p) * var(--scale));
        --h5: calc(var(--h6) * var(--scale));
        --h4: calc(var(--h5) * var(--scale));
        --h3: calc(var(--h4) * var(--scale));
        --h2: calc(var(--h3) * var(--scale));
        --h1: calc(var(--h2) * var(--scale));
      

    
        /* - fluid spacing 
        - fluid design system + components */

        /* related-elements, 
          internal-gap, 
          (icon+text/label+input), 
          button(icon-text) */
        --space-2xs: clamp(
          .4rem,
          calc(.4rem + (.8rem - .4rem) * var(--progress)),
          .8rem
        ); 

        /* button-b, 
          heading-sub-heading, 
          input-fields, 
          padding+items-gap, 
          (inset button, card, list), 
          p/sm-component-gap */
        --space-xs: clamp(
          .8rem,
          calc(.8rem + (1.6rem - .8rem) * var(--progress)),
          1.6rem
        ); 

        /* col-3-layout, 
          sub-heading-body, 
          gap-content, 
          text-blocks, 
          cards-containers, 
          grid-gap, 
          card-in-padding/button-lr-padding, 
          padding-inline */
        --space-s: clamp(
          1.6rem,
          calc(1.6rem + (2.4rem - 1.6rem) * var(--progress)),
          2.4rem
        ); 
        
        /* button-i, 
          body-cta, 
          inset-card-container, 
          (inset sections/large-cards), 
          sm-section-gap/li spacing */
        --space-m: clamp(
          2.4rem,
          calc(2.4rem + (3.2rem - 2.4rem) * var(--progress)),
          3.2rem
        ); 

        /* separating-header-content-blocks, 
          section-gap-i, 
          group-gap, 
          content-block/md-card-padding */
        --space-l: clamp(
          3.2rem,
          calc(3.2rem + (4.8rem - 3.2rem) * var(--progress)),
          4.8rem
        ); 

        /* gap-layout, 
          between rows/sections, 
          (layout-sections), 
          l-componemt-marging/mobile-section-padding */
        --space-xl: clamp(
          4.8rem,
          calc(4.8rem + (6.4rem - 4.8rem) * var(--progress)),
          6.4rem
        ); 

        /* section-gap-b, 
          separet-big-ideas-gap, 
          desktop-sections-gaps */
        --space-2xl: clamp(
          6.4rem,
          calc(6.4rem + (8rem - 6.4rem) * var(--progress)),
          8rem
        ); 
        
        /* (hero section/landing page), 
          hero-section-padding(awards), 
          section-spacing */
        --space-3xl: clamp(
          8rem,
          calc(8rem + (12.8rem - 8rem) * var(--progress)),
          12.8rem
        );
  
        /* --- Bootstrap Breakpoint Definitions --- */
        /* Container Widths */
        --container-fluid: 100dvw;
        --container-xxl: 140rem;
        --container-xl: 128rem;
        --container-lg: 102.4rem;
        --container-md: 76.8rem;
        --container-sm: 64rem;
        --container-xsm: 37.5rem;

        --col-md-2: calc(var(--col-md-1) / 2); /*  Result: Two columns of ~11.5rem each */ 
        --col-md-3: calc(var(--col-md-1) / 3);

        --padding-inline: var(--space-s); /* 1.6 to 3.2em  */


/* new */
        --col-1: span 1;

/* ends */
        --container-xxl-size: calc((var(--container-xxl) - var(--container-xl)) / 2);
        --container-xl-size: calc((var(--container-xl) - var(--container-lg)) / 2);
        --container-lg-size: calc((var(--container-lg) - var(--container-md)) / 2);
        --container-md-size: calc((var(--container-md) - var(--container-sm)) / 2);
        --container-sm-size: calc((var(--container-sm) - var(--container-xsm)) / 2);



        --section-radius: 4rem;

        --shadow-clr: light-dark(rgba(0,0,0,0.1), rgba(0,0,0,0.4));
        /* Shadow Levels */
        --shadow-sm: 0 2px 4px var(--shadow-clr);
        --shadow-md: 0 4px 12px var(--shadow-clr);
        --shadow-lg: 0 12px 24px var(--shadow-clr);
        --shadow-inset: inset 0 2px 4px var(--shadow-clr);
                                  
        /* Neon/Glow effects (Adjust color based on your brand) */
        --glow-clr: light-dark(rgba(0, 100, 250, 0.2), rgba(0, 150, 255, 0.3));
        --shadow-glow: 0 0 20px var(--glow-clr);
    


        /* Glass Effect */
        --glass-bg: light-dark(rgba(255, 255, 255, 0.7), rgba(15, 15, 15, 0.7));
        --glass-border: light-dark(rgba(255, 255, 255, 0.3), rgba(255, 255, 255, 0.1));
        --blur: blur(12px);
                              
        /* Contrast Overlay */
        --overlay: rgba(0, 0, 0, 0.5);

        --surface-glass: light-dark(rgba(255, 255, 255, 0.6), rgba(0, 0, 0, 0.3));                     
        

        /* transition and animation */
  
        --duration-instant: 100ms;
        --duration-fast: 200ms;
        --duration-normal: 300ms;
        --duration-slow: 500ms;
        --duration-v-slow: 1000ms;
        
        /* Soft and smooth - great for opacity or scale */
        --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
                      
        /* Snappy - great for buttons and interactive elements */
        --ease-snappy: cubic-bezier(0.19, 1, 0.22, 1);
                                  
        /* Anticipation - moves back slightly before moving forward */
        --ease-anticipate: cubic-bezier(0.36, 0.03, 0, 0.87);
                                              
        /* Bouncy (Alternative to your current one) */
        --ease-elastic: cubic-bezier(0.68, -0.55, 0.265, 1.55);
                                                      
        --delay-short: 100ms;
        --delay-medium: 250ms;
        --delay-long: 500ms;
        
        /* Example: Transition all with your custom bouncy feel */
        --transition-bouncy: all var(--duration-normal) var(--bouncy);
                      
        /* Example: Standard fade transition */
        --transition-fade: opacity var(--duration-fast) var(--linear);
                              
        
  

        --bouncy: cubic-bezier(.47,1.64,.41,.8);
        --linear: linear;
        --ease: ease;
        --ease-in: ease-in;
        --ease-in-out: ease-in-out;
        --ease-out: ease-out;

        --forwards: forwards;

        /* --- 3D / Parallax Logic --- */
        --perspective: 100rem;
        --translate-z: 0rem;
        --paralax-scale: calc(1 + ((var(--translate-z) * -1) / var(--perspective)));

  
        /* Scaling for hover effects */
        --scale-hover: scale(1.05);
        --scale-active: scale(0.95);
                          
        /* Border Widths(.glass) */
        --border-thin: .1rem solid var(--glass-border);
        --border-thick: .2rem solid var(--glass-border);

        --aspect-ratio: 16/9;

      /* 4. Motion Accessibility */
      /* $no-animation */
      @media (prefers-reduced-motion: reduce) {
        html {
          scroll-behavior: auto;
        }

        * {
          transition: none !important;
          animation: none !important;
        }

          /* Disable parallax scaling by forcing scale to 1 */
          --paralax-scale: 1 !important;
          /* Reset translate for static view */
          --translate-z: 0px !important;
        }

        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;

/**
 * LoaderSection Component
 * Focus: Performance, SEO, and Clean Logic
 * Build: 2026-03-02
 */
class LoaderSection extends HTMLElement {
  connectedCallback() {
    // 1. Create the template
    const template = document.createElement('template');
    template.innerHTML = `
      <section id="loader" aria-hidden="true" class="fluid-grid-system">
       <section class="container-md content-center"> 
        <div class="col items-center">
          <h3 class="greating txt-center flex">
            &lt;<span id="say-hello">Hello</span>/&gt;
          </h3>
        </div>
       </section>
      </section>
    `;

    // 2. Reference the content before we swap it out
    const content = template.content;
    const sayHello = content.querySelector('#say-hello');
    const loader = content.querySelector('#loader');

    // 3. Perform the swap
    this.replaceWith(content);

    // 4. Logic & State
    const greetings = ['Hello', 'مرحباً', 'হ্যালো', 'हेलो', '你好', '안녕하세요', 'こんにちは', 'Bonjour'];
    let i = 0;
    let isPageLoaded = document.readyState === 'complete'; // Check if already loaded

    // Listen for load if not already finished
    if (!isPageLoaded) {
      window.addEventListener('load', () => { isPageLoaded = true; }, { once: true });
    }

    const greetingInterval = setInterval(() => {
      // Update the text
      sayHello.innerText = greetings[i];
      i++;

      // If we've cycled through all greetings
      if (i >= greetings.length) {
        if (isPageLoaded) {
          clearInterval(greetingInterval);
          
          // Fade out and cleanup
          loader.style.transition = 'opacity 0.4s ease';
          loader.style.opacity = '0';
          
          setTimeout(() => {
            loader.remove(); 
          }, 400);
        } else {
          i = 0; // Loop back if page is slow
        }
      }
    }, 200); // 150ms is usually the "sweet spot" for readability
  }
}

if (!customElements.get("loader-section")) {
  customElements.define("loader-section", LoaderSection);
}

      const observerOptions = {
        root: null, // use the viewport
        // avoid 1
        threshold: 0.15, // trigger when 15% of the element is visible
        rootMargin: "0px 0px -50px 0px" // trigger slightly before it enters the view
      };

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.setAttribute('data-visible', 'true');
            // Optional: stop observing once it has appeared
            // observer.unobserve(entry.target); 
          }
        });
      }, observerOptions);

      // Select all elements you want to animate
      document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    


      // for navigation
      const navObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          const id = entry.target.getAttribute('id');
          // const navLink = document.querySelector(`nav a[href="#${id}"]`);
          const navLink = document.querySelector(`nav a[href="${authore.domain}/${id}"]`);
                                    
          if (entry.isIntersecting) {
            navLink?.classList.add('active');
          } else {
            navLink?.classList.remove('active');
          }
