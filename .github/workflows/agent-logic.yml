name: Agentic AI Automation

on:
  # push:           # Commented out to prevent unnecessary runs
  #   branches: [ main ]
  schedule:
    - cron: '0 0 1,15 * *'  # Runs on the 1st and 15th
  workflow_dispatch:      # Manual trigger for testing from Oppo A53

jobs:
  run-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Execute Agentic Brain
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm start

      - name: Commit & Push Changes
        run: |
          VERSION=$(date +'%y.%m.%d')
          git config --global user.name "Hassan-Agent-AI"
          git config --global user.email "hassanbiswas.github.io@gmail.com"
          
          # Force delete existing infinity tag to avoid conflicts
          git push origin :refs/tags/∞ || true
          
          git add .
          # Check if there are changes before committing
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Automated Release - Build $VERSION"
            git tag -f ∞
            git push origin main --force --tags
          else
            echo "No changes detected. Skipping push."
          fi
          
