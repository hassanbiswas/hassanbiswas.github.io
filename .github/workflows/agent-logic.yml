name: Agentic AI Automation

on:
  # push:           # Commented out as per your preference
  #   branches: [ main ]
  schedule:
    - cron: '0 0 1 * *'  # Monthly Execution
  workflow_dispatch:      # Manual trigger from your Oppo A53

jobs:
  run-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Execute Agentic Brain
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm start

      - name: Commit & Push Changes
        run: |
          git config --global user.name "Hassan-Agent-AI"
          git config --global user.email "hassanbiswas.github.io@gmail.com"
          
          # Force delete the infinity tag to prevent "Tag already exists" errors
          git push origin :refs/tags/∞ || true
          
          git add .
          git commit -m "Automated Release - Build $(date +'%y.%m.%d')" || echo "No changes to commit"
          
          git tag -f ∞
          git push origin main --force --tags
          
