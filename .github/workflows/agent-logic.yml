name: Release Automation

on:
  schedule:
    - cron: '0 0 1,15 * *' # Monthly Schedule
  workflow_dispatch:
  # push: # Commented out as requested

jobs:
  release-automation:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Private Repository
        uses: actions/checkout@v4

      - name: Generate Ephemeral Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Set Version Logic
        run: |
          # Automation using your preferred date-based versioning
          echo "VERSION=$(date +'%y.%m.%d')" >> $GITHUB_ENV
          echo "COMMITTEE_MSG=Automated Release - Stable Build" >> $GITHUB_ENV

      - name: Execute Agentic Brain (No-Open Mode)
        run: |
          # Ensure Browsersync or similar tools do not hang the runner
          # --no-open prevents it from trying to launch a browser
          # --no-ui prevents the admin panel from starting
          npx browser-sync start --server --no-open --no-ui --exit

      - name: Flattening and Logic Preservation
        run: |
          # Check for single wrapper folder and move contents to root
          if [ -d "app/assets" ]; then
            cd app/assets
            if [ $(ls -1 | wc -l) -eq 1 ] && [ -d */ ]; then
              mv */* .
              rmdir */
            fi
          fi

      - name: Commit & Push Changes
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Use your specific versioning for the commit and tag
          git add .
          git commit -m "${{ env.COMMITTEE_MSG }} v${{ env.VERSION }}" || echo "No changes to commit"
          
          # Tag Force-Delete & Re-push logic
          git tag -d ∞ || true
          git push origin :refs/tags/∞ || true
          git tag ∞
          git push origin main --tags --force

      - name: Display Release Information
        run: |
          echo "------------------------------------------------"
          echo "Committee Message: ${{ env.COMMITTEE_MSG }}"
          echo "Data Attribute (Version): ${{ env.VERSION }}"
          echo "Status: Complete"
          echo "------------------------------------------------"
          
