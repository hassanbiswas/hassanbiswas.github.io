name: SEO & Manifest Automation

on:
  schedule:
    # Automation: Runs every Sunday at 00:00 UTC (Weekly)
    - cron: '0 0 * * 0'
  workflow_dispatch: 
  push:
    branches: [ main ]
  workflow_run:
    workflows: ["compression.yml"]
    types:
      - completed

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate SEO Assets
        run: |
          cat << 'EOF' > generate-seo.js
          const fs = require('fs');
          const path = require('path');

          try {
            // Updated Versioning Logic: YY.MM.DD format
            const now = new Date();
            const VERSION = now.toLocaleDateString('en-GB').split('/').reverse().join('.');
            const VERSION_DATE = now.toISOString().split('T')[0];
            
            const BASE_URL = 'https://hassanbiswas.github.io';
            const BRAND_COLOR = 'hsl(240, 80%, 50%)'; 

            const CONFIG = {
              '/': { priority: 1.0, changefreq: 'weekly' },
              '/about/': { priority: 0.8, changefreq: 'monthly' },
              '/projects/': { priority: 0.8, changefreq: 'monthly' },
              '/services/': { priority: 0.8, changefreq: 'monthly' },
              '/contact/': { priority: 0.8, changefreq: 'monthly' }
            };

            const INCLUSIONS = {
              folders: ['.', 'about', 'call', 'case-study', 'contact', 'facebook', 'gmail', 'imo', 'instagram', 'linkedin', 'location', 'messenger', 'pinterest', 'privacy-policy', 'projects', 'refund_and_cancelation-policy', 'resume', 'services', 'terms-of-service', 'testimonial', 'threads', 'tiktok', 'vcf', 'whatsapp', 'x', 'youtube'],
              extensions: ['.html']
            };

            const getHtmlFiles = (dir, fileList = []) => {
              if (!fs.existsSync(dir)) return fileList;
              const files = fs.readdirSync(dir);
              files.forEach(file => {
                const filePath = path.join(dir, file);
                const stats = fs.statSync(filePath);
                if (stats.isDirectory()) {
                  const folderName = path.basename(filePath);
                  if (INCLUSIONS.folders.includes(folderName)) {
                    getHtmlFiles(filePath, fileList);
                  }
                } else if (INCLUSIONS.extensions.includes(path.extname(file))) {
                  let urlPath = '/' + path.relative(process.cwd(), filePath).replace(/\\/g, '/').replace(/index\.html$/, '');
                  if (!urlPath.endsWith('/')) urlPath += '/';
                  fileList.push(urlPath);
                }
              });
              return [...new Set(fileList)];
            };

            const allPages = getHtmlFiles(process.cwd());
            if (allPages.length === 0) throw new Error('No HTML files found.');

            const sitemapEntries = allPages.map(page => {
              const settings = CONFIG[page] || { priority: 0.5, changefreq: 'monthly' };
              return `  <url>\n    <loc>${BASE_URL}${page}</loc>\n    <lastmod>${VERSION_DATE}</lastmod>\n    <priority>${settings.priority}</priority>\n    <changefreq>${settings.changefreq}</changefreq>\n  </url>`;
            }).join('\n');

            const sitemap = `<?xml version="1.0" encoding="UTF-8"?>\n<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n${sitemapEntries}\n</urlset>`;
            
            fs.writeFileSync('sitemap.xml', sitemap.trim());
            console.log(`Generated sitemap.xml (v${VERSION}) with Brand Color: ${BRAND_COLOR}`);

          } catch (e) {
            console.error('Automation Error:', e.message);
            process.exit(1);
          }
          EOF
          node generate-seo.js
          rm generate-seo.js

      - name: Commit and Push Changes
        run: |
          VERSION=$(date +'%y.%m.%d')
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git diff-index --quiet HEAD || git commit -m "Automated SEO update: $VERSION"
          git push origin main
          
