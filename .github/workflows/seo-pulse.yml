name: SEO Pulse

on:
  schedule:
    # Runs every Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pulse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Version Logic
        run: |
          # Logic: YY.MM.DD format for automated tracking
          VERSION=$(date +'%y.%m.%d')
          COMMITTEE_MSG="Automated SEO Pulse - Stable Build"
          
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "COMMITTEE_MSG=$COMMITTEE_MSG" >> $GITHUB_ENV

      - name: Commit and Push Changes
        run: |
          git config --global user.name "hassanbiswas"
          git config --global user.email "hassanbiswas.github.io@gmail.com"
          
          # Updates pulse.txt to ensure there is a change to commit weekly
          date > pulse.txt
          git add pulse.txt
          
          if ! git diff --cached --quiet; then
            git commit -m "$COMMITTEE_MSG ($VERSION)"
            git push
          else
            echo "No changes detected, skipping commit."
          fi
          
