name: Generate Dynamic OG Images
on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *' # Monthly automation

jobs:
  generate-og:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Generate OG Image via Script
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          const fs = require('fs');
          const path = './assets/og-images';
          
          if (!fs.existsSync(path)) fs.mkdirSync(path, { recursive: true });

          (async () => {
            try {
              const browser = await puppeteer.launch({ 
                executablePath: '/usr/bin/google-chrome',
                args: ['--no-sandbox', '--disable-setuid-sandbox'] 
              });
              const page = await browser.newPage();
              await page.setViewport({ width: 1200, height: 630 });
              
              const htmlPath = 'file://' + process.cwd() + '/index.html';
              await page.goto(htmlPath, { waitUntil: 'networkidle0' });
              
              // Date-based cache-busting logic
              const VERSION = new Date().getDate();
              const fileName = 'og-main.png';
              
              await page.screenshot({ path: path + '/' + fileName });
              
              await browser.close();
              console.log('OG Image generated successfully. Version Day:', VERSION);
            } catch (err) {
              console.error(err);
              process.exit(1);
            }
          })();
          "

      - name: Commit and Push Images
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. Pull first to ensure we have the latest remote state
          git pull origin main --rebase

          # 2. Add the generated images
          git add assets/og-images/*.png
          
          # 3. Logic: Only proceed if there are actual changes
          if ! git diff --quiet --staged; then
            # Using Date for cache-busting in the commit message
            VERSION=$(node -e "console.log(new Date().getDate())")
            git commit -m "chore: auto-generate dynamic OG images (v$VERSION) [skip ci]"
            git push origin main
          else
            echo "No changes to commit"
          fi
          
