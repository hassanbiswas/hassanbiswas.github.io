name: Monthly SEO Auto-Update
on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:
  workflow_run:
    workflows: ["compression.yml"]
    types:
      - completed

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install beautifulsoup4 lxml

      - name: Execute Logic Automation
        run: |
          python3 - <<EOF
          import os
          from datetime import datetime
          from bs4 import BeautifulSoup

          BRAND_BLUE = "hsl(240, 80%, 50%)"
          BASE_TITLE = "Web Developer | Hassan Biswas — UI/UX & Front-End Architecture"

          def update_html_seo(file_path):
              # 1. Determine Folder/Page Context
              rel_path = os.path.relpath(file_path, ".")
              parts = rel_path.split(os.sep)
              
              # Logic: {folder_name} | {base_title} or {file_name} if in root
              if len(parts) > 1:
                  folder_label = parts[0].replace("-", " ").title()
              else:
                  file_name = os.path.basename(file_path).replace(".html", "")
                  folder_label = "Home" if file_name == "index" else file_name.replace("-", " ").title()

              full_title = f"{folder_label} | {BASE_TITLE}"

              with open(file_path, 'r', encoding='utf-8') as f:
                  soup = BeautifulSoup(f, 'lxml')

              if not soup.head:
                  return

              # 2. Extract unique content for SEO
              # Try to find the first H1 or first Paragraph for a unique description
              page_h1 = soup.find('h1')
              first_p = soup.find('p')
              
              h1_text = page_h1.get_text(strip=True) if page_h1 else folder_label
              snippet = first_p.get_text(strip=True)[:150] if first_p else "Expert UI/UX and Front-End Architecture."
              
              current_date = datetime.now().strftime("%B %Y")
              unique_desc = f"{h1_text}: {snippet} Updated {current_date}."
              unique_keys = f"Hassan Biswas, {folder_label}, {h1_text}, UI/UX, Front-End, Web Design, Bangladesh"

              # 3. Update Title
              if soup.title:
                  soup.title.string = full_title
              else:
                  new_title = soup.new_tag('title')
                  new_title.string = full_title
                  soup.head.insert(0, new_title)

              # 4. Meta Data Updates
              meta_updates = {
                  "description": unique_desc,
                  "keywords": unique_keys,
                  "theme-color": BRAND_BLUE,
                  "author": "Hassan Biswas",
                  "robots": "index, follow"
              }

              for name, content in meta_updates.items():
                  tag = soup.find('meta', attrs={"name": name})
                  if tag:
                      tag['content'] = content
                  else:
                      new_meta = soup.new_tag('meta', attrs={"name": name, "content": content})
                      soup.head.append(new_meta)

              # 5. Ensure H1 matches the page subject if it exists
              if page_h1:
                  page_h1.string = h1_text

              # Save changes
              with open(file_path, 'w', encoding='utf-8') as f:
                  f.write(soup.prettify())

          # Process every .html file in the repo
          for root, _, files in os.walk("."):
              for file in files:
                  if file.endswith(".html") and "node_modules" not in root:
                      update_html_seo(os.path.join(root, file))
          EOF

      - name: Commit and Push changes
        run: |
          git config --global user.name 'Hassan Biswas'
          git config --global user.email 'hassanbiswas.github.io@gmail.com'
          VERSION=$(date +'%y.%m.%d')
          COMMITTEE_MSG="SEO Release - Stable Build $VERSION"
          git add .
          git commit -m "$COMMITTEE_MSG" || exit 0
          git push
          
