name: Refresh Release Assets

on:
  schedule:
    # Monthly Schedule: Runs at 00:00 on day 1 of every month
    - cron: '0 0 1 * *'
  # push:
  #   branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Process Assets and Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Dynamic Versioning Logic: Format YY.MM.DD
          VERSION=$(date +'%y.%m.%d')
          echo "Processing version: $VERSION"

          # 2. Update Manifest Version (Internal Logic Preservation)
          if [ -f "app/assets/manifest.json" ]; then
            sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" app/assets/manifest.json
          fi

          # 3. Flattening Logic: Move contents out of a single wrapper folder
          if [ -d "app/assets" ]; then
            SUB_DIRS=$(find app/assets -maxdepth 1 -type d | wc -l)
            # find includes the parent dir, so 2 means exactly one sub-folder
            if [ "$SUB_DIRS" -eq 2 ]; then
              WRAPPER=$(find app/assets -maxdepth 1 -type d ! -path "app/assets" | head -n 1)
              echo "Flattening: Moving contents from $WRAPPER to app/assets/"
              mv "$WRAPPER"/* app/assets/ 2>/dev/null || true
              rmdir "$WRAPPER" 2>/dev/null || true
            fi
          fi

          # 4. Tag and Release Cleanup
          # Force-delete tag locally and on remote to prevent "Already Exists" errors
          git tag -d ∞ || true
          git push origin :refs/tags/∞ || true
          gh release delete ∞ --yes || true

          # 5. Create Release
          # Logic: Only includes files from app/assets/
          # Notes: Uses app/README.md as the primary source
          NOTES_CONTENT=$(cat app/README.md 2>/dev/null || echo "Automated Monthly Build")
          
          gh release create ∞ \
            --title "V∞" \
            --notes "Release Version: $VERSION | $NOTES_CONTENT" \
            app/assets/*
            
