name: Monthly Automated Backup

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

env:
  # Future-proofing against Node.js 20 deprecation
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate Temporary Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Set Version Logic
        run: |
          # Standardized YY.MM.DD format
          VERSION=$(date +'%y.%m.%d')
          COMMITTEE_MSG="Automated Backup - Stable Build"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "COMMITTEE_MSG=$COMMITTEE_MSG" >> $GITHUB_ENV
          
          echo "------------------------------------------------"
          echo "Committee Message: $COMMITTEE_MSG"
          echo "Data Attribute (Version): $VERSION"
          echo "------------------------------------------------"

      - name: Checkout Source (Private)
        uses: actions/checkout@v4
        with:
          path: source-repo
      - name: Checkout Backup Repo (Public/Backup)
        uses: actions/checkout@v4
        with:
          repository: hassanbiswas/backup
          token: ${{ steps.app-token.outputs.token }}
          path: backup-repo
          # Explicitly define the branch to avoid the "Determining default branch" lookup fail
          ref: main 

      - name: Clean Sync Logic
        run: |
          # Ensure directories exist before rsync
          mkdir -p source-repo backup-repo
          
          # 1:1 Mirroring while excluding git metadata
          # Added --ignore-errors to keep moving if a single file is locked
          rsync -av --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            source-repo/ backup-repo/

      - name: Commit and Push
        working-directory: backup-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Check if there's anything to commit
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "$COMMITTEE_MSG [$VERSION]"
            git push origin main
          else
            echo "No changes detected. Backup is already synchronized."
          fi
          
