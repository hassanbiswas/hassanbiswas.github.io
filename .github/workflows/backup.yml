name: Monthly Automated Backup

on:
  schedule:
    # Monthly Schedule: Runs at 00:00 on the 1st of every month
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Generate Temporary Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Set Version Logic
        run: |
          # Preferred Versioning: YY.MM.DD
          VERSION=$(date +'%y.%m.%d')
          COMMITTEE_MSG="Automated Backup - Stable Build"
          
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "COMMITTEE_MSG=$COMMITTEE_MSG" >> $GITHUB_ENV
          
          echo "------------------------------------------------"
          echo "Committee Message: $COMMITTEE_MSG"
          echo "Data Attribute (Version): $VERSION"
          echo "------------------------------------------------"

      - name: Checkout Source (Private)
        uses: actions/checkout@v4
        with:
          path: source-repo

      - name: Checkout Backup Repo (Private Destination)
        uses: actions/checkout@v4
        with:
          repository: hassanbiswas/backup
          # Use the token directly here so the local .git/config is pre-authenticated
          token: ${{ steps.app-token.outputs.token }}
          path: backup-repo
          ref: main

      - name: Clean Sync Logic
        run: |
          # Syncing source to backup while preserving logic and excluding Git/Workflow files
          rsync -av --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            source-repo/ backup-repo/
            
      - name: Commit and Push
        working-directory: backup-repo
        env:
          # Passing the token as an environment variable for safety
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # Bot Identity
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add -A

          # Only push if there are actual file changes (Set-and-Forget)
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "${{ env.COMMITTEE_MSG }} [${{ env.VERSION }}]"
            # Authentication is already handled by the 'Checkout' token
            git push origin main
          else
            echo "No changes detected. Backup is already synchronized."
          fi
          
