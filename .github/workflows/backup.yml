name: Monthly Automated Backup

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate Temporary Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Set Version Logic
        run: |
          # Automating the versioning format: YY.MM.DD
          VERSION=$(date +'%y.%m.%d')
          COMMITTEE_MSG="Automated Backup - Stable Build"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "COMMITTEE_MSG=$COMMITTEE_MSG" >> $GITHUB_ENV
          
          echo "------------------------------------------------"
          echo "Committee Message: $COMMITTEE_MSG"
          echo "Data Attribute (Version): $VERSION"
          echo "------------------------------------------------"

      - name: Checkout Source (Private)
        uses: actions/checkout@v4
        with:
          path: source-repo

      - name: Checkout Backup Repo (Private Destination)
        uses: actions/checkout@v4
        with:
          # Verify this repository name exactly matches your GitHub repo name
          repository: hassanbiswas/backup
          token: ${{ steps.app-token.outputs.token }}
          path: backup-repo
          ref: main

      - name: Clean Sync Logic
        run: |
          # Use rsync to mirror the content accurately
          # We exclude .git and .github to keep the backup repo clean
          rsync -av --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            source-repo/ backup-repo/
            
      - name: Commit and Push
        working-directory: backup-repo
        run: |
          # Configure Git Bot
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Update the remote URL to use the App Token for authentication
          git remote set-url origin https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/hassanbiswas/backup.git

          # Only push if there are actual file changes
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "${{ env.COMMITTEE_MSG }} [${{ env.VERSION }}]"
            git push origin main
          else
            echo "No changes detected. Backup is already synchronized."
          fi
