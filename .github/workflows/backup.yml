name: Monthly Automated Backup

on:
  schedule:
    # Monthly Schedule: Runs at 00:00 on the 1st of every month
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Generate Temporary Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}
          # Explicitly list the backup repo if it's not the current one
          owner: hassanbiswas
          repositories: |
            hassanbiswas.github.io
            backup

      - name: Set Version Logic
        run: |
          VERSION=$(date +'%y.%m.%d')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "COMMITTEE_MSG=Backup - Stable Build" >> $GITHUB_ENV

      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          path: source-repo

      - name: Checkout Backup Repo
        uses: actions/checkout@v4
        with:
          repository: hassanbiswas/backup
          token: ${{ steps.app-token.outputs.token }}
          path: backup-repo
          persist-credentials: true

      - name: Clean Sync Logic
        run: |
          # Sync source content (excluding git metadata) into the backup folder
          # The trailing slash on source-repo/ is important to copy contents, not the folder itself
          rsync -av --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            source-repo/ backup-repo/
            
      - name: Commit and Push
        working-directory: backup-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add .

          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "${{ env.COMMITTEE_MSG }} [${{ env.VERSION }}]"
            git push origin main
          else
            echo "No changes. Backup is current."
          fi
          
