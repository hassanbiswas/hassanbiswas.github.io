Name: Generate Manifest

on:
  schedule:
    # Runs at 00:00 on the 1st and 15th of every month
    - cron: '0 0 1,15 * *'
  workflow_dispatch:
  # push:
  #   branches:
  #     - main

jobs:
  release-automation:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: [actions/checkout@v4](https://github.com/actions/checkout)

      - name: Generate Ephemeral Token
        id: app-token
        uses: [actions/create-github-app-token@v1](https://github.com/actions/create-github-app-token)
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Set Version Logic
        run: |
          # Matches: YY.MM.DD
          echo "VERSION=$(date +'%y.%m.%d')" >> $GITHUB_ENV
          echo "COMMITTEE_MSG=Release - Stable Build" >> $GITHUB_ENV

      - name: Create manifest.json
        run: |
          # Using single quotes around EOF to prevent shell expansion of parentheses in HSL/SVG
          cat <<'EOF' > manifest.json
          {
            "name": "UI/UX & Front-End Architecture",
            "short_name": "Web Developer",
            "description": "Freelance Front-End Developer & Website Designer specializing in transforming Figma designs into high-performance, SEO-friendly digital experiences.",
            "start_url": "/",
            "display": "standalone",
            "theme_color": "hsl(240, 80%, 50%)",
            "background_color": "hsl(240, 80%, 50%)",
            "orientation": "portrait",
            "version": "${{ env.VERSION }}",
            "icons": [
              {
                "src": "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><path fill='hsl(240, 80%, 50%)' d='M0 0h192v192H0z'/><path fill='none' stroke='%23fff' stroke-width='3' d='M66.481 64.519h-.493l-.308-.319.244.093.154-.046c-.09 0-32.352-30.599-32.352-30.599h61.815V33.5c34.769 0 62.959 27.989 62.959 62.499 0 34.516-28.19 62.501-62.959 62.501v-.71l-30.084-30.662c-1.693-1.409-8.89-8.74-15.947-15.891-8.027-8.145-16.01-16.32-16.01-16.32V64.519h32.13l29.911 30.449v3.031c-8.233-.275-30.236-1.115-30.236-1.115-.186-.178.439 28.69.515 32.175h29.721v-.428c17.605 0 31.872-14.294 31.872-31.93s-14.267-31.929-31.872-31.929v-.465H65.945zM98.566 97.35c0 .027-1.158-.021-3.025-.07v-2.978z'/></svg>",
                "type": "image/svg+xml",
                "sizes": "any",
                "purpose": "any"
              }
            ],
            "shortcuts": [
              {
                "name": "Messenger",
                "url": "https://m.me/hassanbiswas.github.io",
                "icons": [{ "src": "https://www.google.com/s2/favicons?domain=m.me&sz=32", "sizes": "96x96" }]
              },
              {
                "name": "Call",
                "url": "tel:+8801602873384",
                "icons": [{ "src": "https://www.google.com/s2/favicons?domain=wa.me&sz=32", "sizes": "96x96" }]
              },
              {
                "name": "Direction",
                "url": "https://www.google.com/maps",
                "icons": [{ "src": "https://www.google.com/s2/favicons?domain=maps.google.com&sz=32", "sizes": "96x96" }]
              }
            ]
          }
          EOF
          # Replacing the env.VERSION placeholder manually because 'EOF' stops expansion
          sed -i "s/\${{ env.VERSION }}/${{ env.VERSION }}/g" manifest.json

      - name: Commit and Push Changes
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "${{ env.COMMITTEE_MSG }} [${{ env.VERSION }}] [skip ci]" || echo "No changes to commit"
          git push origin main
          
