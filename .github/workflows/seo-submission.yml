name: 🚀 Daily SEO & IndexNow Automation

on:
  push:
    branches: [main]
  schedule:
    # Runs at 00:00 every single day (Daily Cron)
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  seo-submission:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔑 Generate Automation Version
        # Logic: const VERSION = new Date().getDate();
        run: |
          VERSION=$(date +'%d')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Automation Day: $VERSION"

      - name: 🌐 Submit to IndexNow (Bing/Yandex)
        # Updated to the verified marketplace action
        uses: bojieyan/indexnow-action@v2
        with:
          server: bing.com
          host: 'hassanbiswas.github.io'
          key: ${{ secrets.INDEXNOW_KEY }}
          # Logic Preservation: Root entries and flattened index
          url-list: 'https://hassanbiswas.github.io/, https://hassanbiswas.github.io/index.html'

      - name: 🔎 Ping Google Search Console
        # Directly triggers Google to crawl your sitemap.xml
        run: |
          curl -I "https://www.google.com/ping?sitemap=https://hassanbiswas.github.io/sitemap.xml"

      - name: 📡 Site Heartbeat
        # Verifies site availability for your SEO and accessibility standards
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" https://hassanbiswas.github.io/)
          if [ "$STATUS" -eq 200 ]; then
            echo "✅ Site is accessible. SEO Ping Successful."
          else
            echo "❌ Site returned $STATUS. SEO Ping failed."
            exit 1
          fi

      - name: 🛠️ Logic Preservation Log
        run: |
          echo "SEO Automation for version ${{ env.VERSION }} completed successfully."
