name: 🚀 Daily SEO & IndexNow Automation

on:
  push:
    branches: [main]
  schedule:
    # Runs at 00:00 on the 1st of every month
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  seo-submission:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔑 Generate Automation Version
        # Logic: YY.MM.DD format for cache-busting and tracking
        run: |
          VERSION=$(date +'%y.%m.%d')
          COMMITTEE_MSG="Automated SEO Release - Stable Build"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "COMMITTEE_MSG=$COMMITTEE_MSG" >> $GITHUB_ENV
          
          echo "------------------------------------------------"
          echo "Committee Message: $COMMITTEE_MSG"
          echo "Data Attribute (Version): $VERSION"
          echo "------------------------------------------------"

      - name: 🌐 Submit to IndexNow (Bing/Yandex)
        # Using a reliable action to handle IndexNow protocols
        uses: bojieyang/indexnow-action@v2
        with:
          sitemap-location: 'https://hassanbiswas.github.io/sitemap.xml'
          key: ${{ secrets.INDEXNOW_KEY }}

      - name: 🔎 Ping Google Search Console
        # Direct ping to Google's indexing service
        run: |
          curl -I "https://www.google.com/ping?sitemap=https://hassanbiswas.github.io/sitemap.xml"

      - name: 📡 Site Heartbeat
        # Performance and Accessibility check
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" https://hassanbiswas.github.io/)
          if [ $STATUS -eq 200 ]; then
            echo "✅ Site is accessible. SEO Ping Successful."
          else
            echo "❌ Site returned $STATUS. SEO Ping failed."
            exit 1
          fi

      - name: 🛠️ Logic Preservation Log
        # Final log using the preferred VERSION logic
        run: |
          echo "SEO Automation for version ${VERSION completed successfully."
          echo "Message: $COMMITTEE_MSG"
          echo "Reference: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          
