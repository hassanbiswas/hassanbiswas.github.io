name: Deploy

on:
  # push:
  #   branches:
  #     - main
  #   paths:
  #     - '**'
  workflow_run:
    workflows: ["compression.yml"]
    types:
      - completed
  schedule:
    # Zero Maintenance: Executes automatically at 00:00 on the 1st and 15th
    - cron: '0 0 1,15 * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  process-and-deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Generate GitHub App Token
        id: generate_token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout Private Source
        uses: actions/checkout@v4
        with:
          # Pulling from your private repo: hassanbiswas/submodules
          repository: hassanbiswas/submodules
          token: ${{ steps.generate_token.outputs.token }}
          persist-credentials: false
          # Flattening logic: checks out directly into the root workspace
          path: '.'

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # This uploads the private index.html to the Pages server 
          # but does NOT commit it to your public repo branch.
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        
