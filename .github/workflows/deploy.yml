name: Deploy

on:
  push:
    branches:
      - main
  workflow_run:
    workflows: ["compression.yml"]
    types:
      - completed
  schedule:
    # Zero Maintenance: Executes automatically at 00:00 on the 1st of every month
    - cron: '0 0 1 * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  process-and-deploy:
    runs-on: ubuntu-latest
    # Logic Preservation: Only runs if schedule/dispatch OR successful compression
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Ephemeral Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Set Version Logic
        run: |
          # Logic Preservation: Standardized YY.MM.DD format
          echo "VERSION=$(date +'%y.%m.%d')" >> $GITHUB_ENV
          echo "COMMITTEE_MSG=Public Deployment - Stable Build" >> $GITHUB_ENV

      - name: Display Release Information
        run: |
          echo "------------------------------------------------"
          echo "Committee Message: ${{ env.COMMITTEE_MSG }}"
          echo "Data Attribute (Version): ${{ env.VERSION }}"
          echo "------------------------------------------------"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Points to the root where index.html is located in your public repo
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        
