name: Auto Update Versioning

on:
  schedule:
    # Runs at 00:00 on the 1st and 15th of every month
    - cron: '0 0 1,15 * *'
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  release-automation:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Ephemeral Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Set Version Logic
        run: |
          # Using your preferred YY.MM.DD format
          echo "VERSION=$(date +'%y.%m.%d')" >> $GITHUB_ENV
          echo "COMMITTEE_MSG=Automated Release - Stable Build" >> $GITHUB_ENV

      - name: Sync Version in Manifest and Service Worker
        run: |
          # Update version and version_name in manifest.json
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" manifest.json
          sed -i "s/\"version_name\": \".*\"/\"version_name\": \"$VERSION\"/" manifest.json
          
          # Update the VERSION constant in sw.js for cache-busting
          # Matches: const VERSION = '...'; or const VERSION = "...";
          sed -i "s/const VERSION = .*;/const VERSION = '$VERSION';/" sw.js

      - name: Display Release Information
        run: |
          echo "------------------------------------------------"
          echo "Committee Message: $COMMITTEE_MSG"
          echo "Data Attribute (Version): $VERSION"
          echo "------------------------------------------------"

      - name: Commit and Push Changes
        run: |
          git config --global user.name "hassanbiswas"
          git config --global user.email "hassanbiswas.github.io@gmail.com"
          
          git add manifest.json sw.js
          
          if git diff --staged --quiet; then
            echo "No version changes to commit."
          else
            git commit -m "$COMMITTEE_MSG [${VERSION] [skip ci]"
            # Using the generated app token for the push
            git push https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/${{ github.repository }}.git
          fi
          
