      const VERSION = new Date().toLocaleDateString('en-GB').split('/').reverse().join('.');

        if (type === 'css') {
          document.write(`<link rel="stylesheet" href="${versionedPath}" media="${media}">`);
        } else {
        document.write(`<script defer src="${versionedPath}"><\/script>`);
        }
